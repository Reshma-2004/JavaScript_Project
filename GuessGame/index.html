<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Number Game</title>
</head>

<link rel="stylesheet" href="style.css">
<body>
    <h1>Practice Problem 4:Number Guessing Game</h1>
    <div class="box">
        <div class="container">
        <h2>Guess Number Game</h2>
        <form >
            <label for="guessNumber">Enter Number</label>
            <input type="number" id="guess"placeholder="Enter Number">
            <input type="submit" id="submit">
        </form>
        <div class="display">
            <p class="result"></p>
            <p>Previous Guess:<span class="prevGuess"></span></p>
            <p >remaining Guess:<span class="remainingGuess"></span></p>
            
        </div>
    </div>
    </div>
</body>
<script src="script.js"></script>
</html>
